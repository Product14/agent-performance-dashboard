<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINI · Agent Performance</title>
<style>
  :root{
    --bg:#F4F5F8; --card:#FFFFFF; --sink:#F1F1F5;
    --hair:#E1E3E9; --hair-2:#C4C2D1;
    --ink:#262C42; --ink-2:#4C495D; --ink-3:#86839A; --faint:#AAA8BD;
    --accent:#522EBF; --accent-2:#6843CC; --soft:#F1EDFB;
    --pos:#008743; --pos-s:#EBFAF3; --neg:#B42318; --neg-s:#FFF5F5;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --mono:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --sh:none;
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;
    background:var(--bg);min-height:100vh}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#D3D7DF;border-radius:11px;border:3px solid transparent;background-clip:padding-box}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:.09em}

  .top{position:sticky;top:0;z-index:50;height:60px;display:flex;align-items:center;gap:16px;padding:0 26px;background:rgba(246,247,249,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--hair)}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:16px}
  .logo .mk{width:30px;height:30px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
  .nav{display:flex;gap:2px;margin-left:8px}
  .nav a{font-size:13px;font-weight:600;color:var(--ink-3);padding:9px 12px;border-radius:9px;transition:.15s;position:relative}
  .nav a:hover{color:var(--ink);background:#F1F1F5}
  .nav a.on{color:var(--accent)}
  .nav a.on:after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;border-radius:2px;background:var(--accent)}
  .grow{flex:1}
  .me{width:36px;height:36px;border-radius:11px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px}

  .page{max-width:1240px;margin:0 auto;padding:26px 26px 70px}
  .head{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
  .eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--accent)}
  h1{font-size:27px;font-weight:800;letter-spacing:-.03em;margin-top:5px}
  .head .sub{color:var(--ink-2);font-size:13.5px;margin-top:5px}
  .head .ctrls{margin-left:auto;display:flex;align-items:center;gap:10px}

  .aswitch{position:relative}
  .aswitch .cb{display:flex;align-items:center;gap:10px;padding:7px 12px 7px 8px;border-radius:13px;background:#fff;border:1px solid var(--hair-2);box-shadow:var(--sh);transition:.15s}
  .aswitch .cb:hover{border-color:#C9CFDA}
  .aswitch .pin{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--accent);color:#fff;font-weight:800;font-size:13px}
  .aswitch .an{font-size:13.5px;font-weight:700;line-height:1.05}
  .aswitch .ar{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:.05em}
  .aswitch .chev{color:var(--faint);transition:.2s}.aswitch.open .chev{transform:rotate(180deg)}
  .menu{position:absolute;top:calc(100% + 8px);right:0;min-width:250px;background:#fff;border:1px solid var(--hair-2);border-radius:15px;padding:6px;z-index:70;opacity:0;transform:translateY(-6px);pointer-events:none;transition:.16s}
  .aswitch.open .menu{opacity:1;transform:none;pointer-events:auto}
  .mo{display:flex;align-items:center;gap:11px;padding:10px;border-radius:11px;width:100%;text-align:left;transition:.12s}
  .mo:hover{background:var(--sink)}.mo.sel{background:var(--soft)}
  .mo .mi{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--ink);color:#fff;font-weight:800;font-size:12px}
  .mo.sel .mi{background:var(--accent)}
  .mo .mn{font-size:13.5px;font-weight:700}.mo .mr{font-size:10px;color:var(--faint);font-family:var(--mono)}
  .mo .mrate{margin-left:auto;font-weight:800;color:var(--accent)}

  .period{display:inline-flex;background:#F1F1F5;border-radius:12px;padding:4px}
  .period button{padding:7px 12px;border-radius:9px;font-size:12px;font-weight:700;color:var(--ink-2);font-family:var(--mono);letter-spacing:.04em}
  .period button.on{background:#fff;color:var(--accent);box-shadow:var(--sh)}

  /* HERO */
  .hero{border-radius:22px;padding:26px 28px;background:#fff;border:1px solid var(--hair);box-shadow:var(--sh);margin-bottom:16px;position:relative;overflow:hidden}
  .hero:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .hero-in{display:grid;grid-template-columns:1fr 1.05fr;gap:30px;align-items:center}
  .hero-cap{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--accent);font-weight:700}
  .hero-big{font-size:62px;font-weight:800;letter-spacing:-.045em;line-height:1;margin-top:10px;color:var(--ink);font-variant-numeric:tabular-nums}
  .hero-run{font-size:13.5px;color:var(--ink-2);margin-top:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .hero-trend{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12px;padding:5px 11px;border-radius:9px;background:var(--pos-s);color:var(--pos)}
  .builder{display:flex;align-items:center;gap:12px;background:var(--sink);border:1px solid var(--hair);border-radius:18px;padding:18px 14px}
  .bcell{text-align:center;flex:1}
  .bcell .bn{font-size:25px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--ink)}
  .bcell .bl{font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:var(--faint);margin-top:7px}
  .bop{font-size:19px;color:var(--faint);font-weight:600}
  .bcell.edit{background:var(--soft);border-radius:13px;padding:12px 6px;flex:1.15}
  .binput{display:inline-flex;align-items:center;justify-content:center;font-size:23px;font-weight:800;color:var(--accent)}
  .binput input{width:76px;font:inherit;color:var(--accent);border:none;border-bottom:2px dashed var(--accent);background:transparent;text-align:center;outline:none;padding:2px 0;-moz-appearance:textfield}
  .binput input::-webkit-outer-spin-button,.binput input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

  /* KPI cards minimal */
  .kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(188px,1fr));gap:16px;margin-bottom:16px}
  .kpi{background:#fff;border:1px solid var(--hair);border-radius:var(--r);padding:18px;box-shadow:var(--sh);transition:.18s;min-width:0}
  .kpi:hover{border-color:var(--hair-2);transform:translateY(-2px)}
  .kpi .ki{width:32px;height:32px;border-radius:9px;background:var(--soft);color:var(--accent);display:grid;place-items:center;margin-bottom:13px}
  .kpi .kl{font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;color:var(--ink-3)}
  .kpi .kv{font-size:29px;font-weight:800;letter-spacing:-.03em;margin-top:5px;font-variant-numeric:tabular-nums}
  .kpi .kspark{height:26px;margin-top:11px}
  .kpi .kf{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .kpi .ks{font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.04em}
  .dl-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;padding:2px 7px;border-radius:7px}
  .dl-chip.up{background:var(--pos-s);color:var(--pos)}.dl-chip.down{background:var(--neg-s);color:var(--neg)}
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .55s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.22,1,.36,1)}
  .reveal.in{opacity:1;transform:none}
  .kpi{position:relative}
  .kpi .kx{position:absolute;top:15px;right:14px;color:var(--faint);transition:transform .25s,color .25s;line-height:0}
  .kpi.open .kx{transform:rotate(180deg);color:var(--accent)}
  .livedot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-left:6px;animation:blink 1.6s ease-in-out infinite;vertical-align:middle}
  @keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
  .kpi-more{margin-top:12px}
  .kpi-more .mr{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--hair);font-size:12px}
  .kpi-more .mr .ml2{color:var(--ink-2);font-weight:600}.kpi-more .mr .mv2{font-weight:800;font-variant-numeric:tabular-nums}
  .kpi-dual .kdual{display:flex;gap:14px;margin-top:2px}
  .kpi-dual .kd{flex:1;min-width:0}
  .kpi-dual .kd+.kd{border-left:1px solid var(--hair);padding-left:14px}
  .kpi-dual .kd .kv{font-size:23px;margin-top:4px}
  .bkgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px 24px}
  .bkcell .bkv{font-size:26px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--ink)}
  .bkcell .bkl{font-size:12.5px;color:var(--ink-3);margin-top:4px;font-weight:600}
  @media(max-width:600px){.bkgrid{grid-template-columns:repeat(2,1fr)}}
  .hcell{position:relative}.hcell.snk{transform:scale(1.16);z-index:2}
  .khint{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--faint);margin:-4px 2px 16px;text-align:right}
  .frow{cursor:pointer;padding:5px;border-radius:10px;transition:background .15s}
  .frow:hover{background:var(--sink)}.frow.sel{background:var(--soft)}
  .fdetail{max-height:0;overflow:hidden;opacity:0;background:var(--sink);border:1px solid var(--hair);border-radius:12px;padding:0 14px;transition:max-height .35s cubic-bezier(.22,1,.36,1),opacity .3s,padding .35s,margin-top .35s;font-size:13px;color:var(--ink-2)}
  .fdetail.show{max-height:90px;opacity:1;padding:13px 15px;margin-top:14px}
  .fdetail b{color:var(--ink)}.fdetail .k{color:var(--accent);font-weight:800}
  .hero-left{min-width:0}
  .hero-run{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .hero-sub{font-size:12.5px;color:var(--ink-2)}
  .hvspark{height:44px;margin-top:18px}
  .hero-cum{font-family:var(--mono);font-size:8.5px;letter-spacing:.09em;color:var(--faint);margin-top:7px}
  .sec-h .snum{color:var(--accent);font-family:var(--mono);font-weight:800;font-size:14px;margin-right:11px}
  .segcap{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--faint);margin:0 2px 11px}
  .segbar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .segtab{padding:15px 17px;border-radius:15px;border:1px solid var(--hair);background:#fff;box-shadow:var(--sh);cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}
  .segtab:hover{transform:translateY(-2px);border-color:var(--hair-2)}
  .segtab.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .segtab .stl{font-size:13px;font-weight:700}
  .segtab .strow{display:flex;align-items:baseline;gap:8px;margin-top:8px}
  .segtab .stbig{font-size:22px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .segtab .stpc{font-size:11px;font-weight:800;color:var(--accent);background:var(--soft);padding:2px 7px;border-radius:6px}
  .segtab .stv{font-family:var(--mono);font-size:8px;color:var(--faint);letter-spacing:.06em;margin-top:8px}
  .segtab.on .stv{color:var(--accent)}
  .segtab.empty{border-style:dashed;background:var(--sink);cursor:default;box-shadow:none}
  .segtab.empty .stl{color:var(--ink-3);font-weight:600}
  .segtab.empty .add{font-size:20px;font-weight:800;color:var(--accent)}
  .segwrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .seggroup{border:1px solid var(--hair);border-radius:18px;padding:12px 13px 14px;background:var(--sink)}
  .seggroup.sales{border-top:3px solid #522EBF}
  .seggroup.service{border-top:3px solid #0891B2}
  .seggroup-h{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;font-weight:700;color:var(--ink-2);text-transform:uppercase;margin:2px 2px 12px}
  .seg-dot{width:9px;height:9px;border-radius:50%}
  .seggrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .seggroup .segtab{background:#fff}
  .seggroup.service .segtab.on{border-color:#0891B2;box-shadow:0 0 0 1px #0891B2}
  .seggroup.service .segtab.on .stv{color:#0891B2}
  .seggroup.service .segtab .stpc{color:#0891B2;background:#0891B214}
  @media(max-width:720px){.segwrap{grid-template-columns:1fr}}
  .customdates{display:flex;align-items:center;gap:10px;margin:14px 0 0;padding:12px 14px;background:#fff;border:1px solid var(--hair);border-radius:12px;box-shadow:var(--sh)}
  .customdates .cd-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--faint);font-weight:700}
  .customdates .cd-input{font-family:var(--sans);font-size:13px;padding:6px 10px;border:1px solid var(--hair-2);border-radius:9px;color:var(--ink);background:#fff}
  .customdates .cd-sep{color:var(--faint)}
  @media(max-width:1080px){.segbar{grid-template-columns:repeat(2,1fr)}}
  .srclist{display:flex;flex-direction:column;gap:3px}
  .srcrow{display:grid;grid-template-columns:22px 1fr 32% 62px;gap:14px;align-items:center;padding:10px 6px;border-radius:10px;transition:background .12s}
  .srcrow:hover{background:var(--sink)}
  .srcrow .sri{font-family:var(--mono);font-size:11px;font-weight:800;color:var(--faint)}
  .srcrow:first-child .sri{color:var(--accent)}
  .srcrow .srn{font-size:13.5px;font-weight:700;min-width:0}
  .srcrow .srn .srs{display:block;font-family:var(--mono);font-size:8.5px;color:var(--faint);font-weight:500;letter-spacing:.04em;margin-top:3px}
  .srbar{height:8px;background:var(--sink);border-radius:6px;overflow:hidden;border:1px solid var(--hair)}
  .srbar .lfill{height:100%;border-radius:6px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
  .srcrow .srb{text-align:right;font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
  .srcrow .srb.z{color:var(--faint)}
  .srcrow .srb span{display:block;font-family:var(--mono);font-size:7.5px;color:var(--faint);font-weight:500;letter-spacing:.05em;margin-top:2px}
  .stkbar{display:flex;height:22px;border-radius:8px;overflow:hidden;border:1px solid var(--hair);margin-bottom:16px}
  .stkseg{height:100%;width:0;transition:width .9s cubic-bezier(.22,1,.36,1)}
  .rlist{display:flex;flex-direction:column;gap:1px}
  .rhead{display:grid;grid-template-columns:1fr 66px 66px 56px;gap:10px;font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;color:var(--faint);padding:0 6px 8px;border-bottom:1px solid var(--hair);margin-bottom:4px}
  .rhead span:not(:first-child){text-align:right}
  .rrow{display:grid;grid-template-columns:1fr 66px 66px 56px;gap:10px;align-items:center;padding:9px 6px;border-radius:8px;font-size:13px;transition:background .12s}
  .rrow:hover{background:var(--sink)}
  .rrow .rn2{font-weight:600}.rrow .rdot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:9px;vertical-align:middle}
  .rrow .num{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  .qt.qr{display:flex;align-items:center;gap:13px}
  .qt.qr .ql{margin-top:0;line-height:1.35}
  .fbar,.lfill,.stkseg,.dseg,.arc,.hcell,.hs,.wbar,.vbar,.srbar .lfill{transition:none!important;animation:none!important}
  .teamgrid{display:grid;grid-template-columns:230px 1fr;gap:30px;align-items:center}
  .bubbles{display:grid;place-items:center}.bubbles svg{width:210px;height:200px;max-width:100%}
  .teamlist{display:flex;flex-direction:column;gap:16px}
  .tlrow{display:grid;grid-template-columns:36px 1fr auto;gap:14px;align-items:center;cursor:pointer;padding:8px;border-radius:12px;transition:background .12s}
  .tlrow:hover{background:var(--sink)}.tlrow.on{background:var(--soft)}
  .tlav{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
  .tlmid{min-width:0}
  .tlname{font-size:14px;font-weight:700}
  .tlname .tlsub{font-family:var(--mono);font-size:8px;color:var(--faint);letter-spacing:.06em;margin-left:7px;font-weight:600}
  .tlbar{height:8px;background:var(--sink);border-radius:6px;overflow:hidden;margin-top:8px}
  .tlbar i{display:block;height:100%;border-radius:6px}
  .tlval{text-align:right;font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
  .tlval span{display:block;font-family:var(--mono);font-size:8px;color:var(--faint);font-weight:500;letter-spacing:.04em;margin-top:3px}
  @media(max-width:820px){.teamgrid{grid-template-columns:1fr;justify-items:center}}

  .aicard{background:#fff;border:1px solid var(--hair);border-left:3px solid var(--accent);border-radius:14px;padding:16px 18px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px}
  .aitag{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.1em;color:var(--accent);background:var(--soft);padding:5px 10px;border-radius:20px;white-space:nowrap}
  .aicard .aitxt{font-size:14px;font-weight:500;line-height:1.5}.aicard b{color:var(--accent)}

  .sec-h{display:flex;align-items:center;gap:11px;margin:30px 2px 14px;padding-bottom:12px;border-bottom:1px solid var(--hair)}
  .sec-h .si{width:28px;height:28px;border-radius:9px;background:var(--soft);color:var(--accent);display:grid;place-items:center}
  .sec-h h2{font-size:16px;font-weight:800;letter-spacing:-.02em}
  .sec-h .sn{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.08em;margin-left:auto}
  .grid{display:grid;gap:16px}.g2{grid-template-columns:1fr 1fr}
  .card{background:#fff;border:1px solid var(--hair);border-radius:var(--r);padding:22px;box-shadow:var(--sh)}
  .card h3{font-size:15px;font-weight:700}
  .card .csub{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.07em;margin:4px 0 18px}

  .funnel{display:flex;flex-direction:column;gap:13px}
  .frow{display:grid;grid-template-columns:150px 1fr 78px;gap:16px;align-items:center}
  .frow .fn{font-size:24px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .frow .fl{font-size:11.5px;color:var(--ink-2);font-weight:600;margin-top:3px}
  .ftrack{height:32px;border-radius:9px;background:var(--sink);overflow:hidden;border:1px solid var(--hair)}
  .fbar{height:100%;border-radius:8px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;justify-content:flex-end;padding-right:11px;color:#fff;font-weight:800;font-size:12px}
  .fbar span{opacity:1}
  .frow .fd{text-align:right;font-size:11.5px;font-weight:800}
  .up{color:var(--pos)}.down{color:var(--neg)}

  .donut-wrap{display:flex;align-items:center;gap:26px}
  .dleg{display:flex;flex-direction:column;gap:14px}
  .dl{display:flex;align-items:center;gap:11px;font-size:14px}.dl i{width:12px;height:12px;border-radius:4px}
  .dl .dn{font-weight:800;font-variant-numeric:tabular-nums}.dl .dp{font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:5px}
  .dmeta{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.05em;margin-top:14px;border-top:1px solid var(--hair);padding-top:12px}.dmeta b{color:var(--ink);font-family:var(--sans)}

  .heat{display:grid;gap:6px}
  .hcell{aspect-ratio:1;border-radius:6px;opacity:0;transition:transform .15s,opacity .5s}
  .hcell:hover{transform:scale(1.2)}
  .hleg{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.06em;margin-top:12px}
  .hleg .sc{display:flex;gap:3px}.hleg .sc i{width:14px;height:14px;border-radius:4px}
  .strip{display:flex;gap:6px}

    <div class="card"><h3>Upcoming appointments</h3><div class="csub">CUSTOMER · VEHICLE</div><div class="tl">${a.appts.map(([n,v,d])=>`<div class="tli"><div class="td">${d.toUpperCase()}</div><div class="tn">${n}</div><div class="tv">${v}</div></div>`).join('')}</div></div>
    <div class="card"><h3>Priority follow-ups</h3><div class="csub">FLAGGED CALLBACKS</div><div class="empty"><div class="ei"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2Z"/></svg></div><h4>No callbacks flagged</h4><p>They'll appear here when the agent flags one.</p></div>
      <h3 style="margin-top:8px">Highlights</h3><div class="csub">BEST BOOKED CALLS</div>${a.wins.slice(0,3).map(([t,d])=>`<div class="di"><span>${t}</span><span class="dd">${d}</span></div>`).join('')}</div>
  </div>`;
  h+=secH(I.team,'Team leaderboard','VALUE ACROSS AGENTS');
  const rows=ORDER.map(k=>{const g=AGENTS[k];const gap=sc(g.funnel[3].n,f);const pr=STATE.perMap[k]!=null?STATE.perMap[k]:g.per;return{k,g,leads:sc(g.funnel[0].n,f),ap:gap,value:gap*pr};}).sort((x,y)=>y.value-x.value);
  const maxV=Math.max(...rows.map(r=>r.value),1),TC={emily:'#522EBF',marcus:'#6843CC',sofia:'#8460D9'},BPOS=[[122,104],[58,66],[76,148]];
  let TBUB='';rows.forEach((r,i)=>{const rad=30+26*(r.value/maxV),p=BPOS[i]||[112,104],col=TC[r.k]||'#6843CC',lab='$'+(r.value>=1000?(r.value/1000).toFixed(1)+'k':r.value);TBUB+=`<circle cx="${p[0]}" cy="${p[1]}" r="${rad.toFixed(1)}" fill="${col}" opacity="${i===0?.96:.88}"/><text x="${p[0]}" y="${p[1]+1}" text-anchor="middle" dominant-baseline="middle" font-size="${Math.max(12,rad*0.34).toFixed(0)}" font-weight="800" fill="#fff">${lab}</text>`;});
  h+=`<div class="card"><div class="teamgrid"><div class="bubbles"><svg viewBox="0 0 210 200">${TBUB}</svg></div><div class="teamlist">${rows.map(r=>{const pct=Math.round(r.value/maxV*100),col=TC[r.k]||'#6843CC';return `<div class="tlrow lbrow ${r.k===STATE.agent?'on':''}" data-k="${r.k}"><div class="tlav" style="background:${col}">${r.g.initials}</div><div class="tlmid"><div class="tlname">${r.g.name} <span class="tlsub">${r.g.role.toUpperCase()}</span></div><div class="tlbar"><i style="width:${pct}%;background:${col}"></i></div></div><div class="tlval">$${fmt(r.value)}<span>${r.ap} APPTS · ${r.g.bookingRate}%</span></div></div>`;}).join('')}</div></div></div>`;
  $('app').innerHTML=h;
  post(a,f);
}
function kpi(icon,label,val,sub,delta,sparkId,more){more=more||[];return `<div class="kpi"><div class="ki"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${icon}"/></svg></div><div class="kl">${label.toUpperCase()}</div><div class="kv">${val}</div><div class="kf"><span class="ks">${sub.toUpperCase()}</span>${delta?`<span class="dl-chip ${delta<0?'down':'up'}">${delta<0?'▼':'▲'} ${Math.abs(delta)}%</span>`:''}</div>${more.length?`<div class="kpi-more">${more.map(([l,v])=>`<div class="mr"><span class="ml2">${l}</span><span class="mv2">${v}</span></div>`).join('')}</div>`:''}</div>`;}

function kpiDual(icon,l1,v1,l2,v2,more){more=more||[];return `<div class="kpi kpi-dual"><div class="ki"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${icon}"/></svg></div><div class="kdual"><div class="kd"><div class="kl">${l1.toUpperCase()}</div><div class="kv">${v1}</div></div><div class="kd"><div class="kl">${l2.toUpperCase()}</div><div class="kv">${v2}</div></div></div>${more.length?`<div class="kpi-more">${more.map(([l,v])=>`<div class="mr"><span class="ml2">${l}</span><span class="mv2">${v}</span></div>`).join('')}</div>`:''}</div>`;}
function post(a,f){
  countUp($('app'));
  requestAnimationFrame(()=>{document.querySelectorAll('.arc').forEach(c=>c.style.strokeDashoffset=c.dataset.off);document.querySelectorAll('.lfill').forEach(i=>i.style.width=i.dataset.w+'%');document.querySelectorAll('.stkseg').forEach(s=>s.style.width=s.dataset.w+'%');});
  document.querySelectorAll('.fbar').forEach(b=>{b.style.width=b.dataset.w+'%';b.classList.add('show');});
  stopAnim();
  donut($('donut'),[{val:a.channel.voicePct,color:AC,big:a.channel.smsPct+'%',sub:'SMS'},{val:a.channel.smsPct,color:'#C4C2D1'}],150);
  const pts=Math.max(7,Math.round(30*f)),cols=pts>20?15:pts>10?10:7;heatmap($('heat'),genSeries(a.seed+31,pts,sc(a.funnel[0].n,f)),cols);
  const sl=$('hscale');if(sl)sl.innerHTML=[.1,.35,.6,.85,1].map(x=>`<i style="background:${hexA(x)}"></i>`).join('');
  todChart($('tod'),genSeries(a.seed+9,12,100).map((v,i)=>({label:['7a','8a','9a','10a','11a','12p','1p','2p','3p','4p','5p','6p'][i],v})));
  strip($('reply'),a.reply.map((v,i)=>({label:['Same day','Day 1','Day 2','Day 3+'][i],v})));
  weekChart($('week'),genSeries(a.seed+25,7,sc(a.calls,f)).map((v,i)=>({label:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i],v})));
  (function(){const el=$('hvspark');if(!el)return;const b=genSeries(a.seed+50,24,100,1);let s=0,cum=b.map(v=>s+=v);area(el,cum,44);})();
  const inp=$('perInput');if(inp)inp.oninput=()=>{const v=Math.max(0,Math.round(+inp.value||0));STATE.perMap[STATE.agent]=v;const ap=sc(a.funnel[3].n,f),val=ap*v;const iv=$('hval');iv.dataset.done=1;iv.textContent=fmt(val);$('eqVal').textContent='$'+fmt(val);$('annVal').textContent=fmt(val*12);};
  const fd=$('fdetail');document.querySelectorAll('#funnel .frow').forEach(r=>r.onclick=()=>{const i=+r.dataset.i;document.querySelectorAll('#funnel .frow').forEach(x=>x.classList.toggle('sel',x===r));const R=a.funnel[i],prev=i?a.funnel[i-1]:null,n=sc(R.n,f);fd.innerHTML=i===0?`<span class="k">Top of funnel</span> — <b>${fmt(n)}</b> unique leads entered · trend <b>${R.delta}%</b> vs prior period`:`<span class="k">${R.k}</span> — <b>${fmt(n)}</b> of <b>${fmt(sc(prev.n,f))}</b> ${prev.k.toLowerCase()} · <b>${R.pct}%</b> step conversion · <b>${fmt(Math.max(0,sc(prev.n,f)-n))}</b> dropped off · trend <b>${R.delta}%</b>`;fd.classList.add('show');});
  document.querySelectorAll('.segtab[data-k]').forEach(t=>t.onclick=()=>{const seg=SEGMENTS.find(s=>s.key===t.dataset.k);if(!seg||!seg.agent)return;STATE.segment=seg.key;STATE.agent=seg.agent;syncSwitch();render();window.scrollTo({top:0,behavior:'smooth'});});
  document.querySelectorAll('.lbrow').forEach(tr=>tr.onclick=()=>{STATE.agent=tr.dataset.k;STATE.segment=AGSEG[tr.dataset.k]||STATE.segment;syncSwitch();render();window.scrollTo({top:0,behavior:'smooth'});});
}
function buildPeriod(){const pills=[...Object.keys(RANGE),'Custom'];$('period').innerHTML=pills.map(p=>`<button class="${p===STATE.period?'on':''}" data-p="${p}">${p}</button>`).join('');
  document.querySelectorAll('#period button').forEach(b=>b.onclick=()=>{STATE.period=b.dataset.p;toggleCustomDates();buildPeriod();render();});}
function toggleCustomDates(){const el=$('customDates');if(el)el.style.display=STATE.period==='Custom'?'flex':'none';}
function buildMenu(){$('agMenu').innerHTML=ORDER.map(k=>{const a=AGENTS[k];return `<button class="mo ${k===STATE.agent?'sel':''}" data-k="${k}"><span class="mi">${a.initials}</span><span><span class="mn">${a.name}</span><br><span class="mr">${a.role.toUpperCase()}</span></span><span class="mrate">${a.bookingRate}%</span></button>`;}).join('');
  document.querySelectorAll('#agMenu .mo').forEach(b=>b.onclick=()=>{STATE.agent=b.dataset.k;STATE.segment=AGSEG[b.dataset.k]||STATE.segment;$('aswitch').classList.remove('open');syncSwitch();render();});}
function syncSwitch(){const a=AGENTS[STATE.agent];$('agPin').textContent=a.initials;$('agName').textContent=a.name;$('agRole').textContent=a.role.toUpperCase();buildMenu();}
$('aswitchBtn').onclick=e=>{e.stopPropagation();$('aswitch').classList.toggle('open');};
document.addEventListener('click',()=>$('aswitch').classList.remove('open'));
$('agMenu').onclick=e=>e.stopPropagation();
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(render,160);});
['cdFrom','cdTo'].forEach(id=>{const el=$(id);if(el)el.onchange=()=>{const fr=$('cdFrom').value,to=$('cdTo').value;if(fr&&to){const d=(new Date(to)-new Date(fr))/86400000+1;STATE.customFactor=Math.max(.1,Math.min(3,d/30));}render();};});
buildPeriod();syncSwitch();render();
</script>
</body>
